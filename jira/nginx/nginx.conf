events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 开启高效传输模式
    sendfile        on;
    keepalive_timeout  65;

    # 强制将所有 HTTP 请求重定向到 HTTPS
    server {
        listen 80;
        server_name jira.fun1888.com; # 👈 替换为你的域名
        return 301 https://$host$request_uri;
    }

    # HTTPS 服务
    server {
        listen 443 ssl;
        server_name jira.fun1888.com; # 👈 替换为你的域名

        # SSL 证书配置
        ssl_certificate /etc/nginx/certs/fun1888.com.pem; # 👈 改为你的证书名
        ssl_certificate_key /etc/nginx/certs/fun1888.com.key; # 👈 改为你的私钥名

        # 推荐的 SSL 安全调优参数
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 针对 Jira 的大文件上传调优参数（如附件上传）
        client_max_body_size 100m;

        location / {
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 代理到 docker-compose 内部的 jira 服务，端口为 8080
            proxy_pass http://jira:8080;
            
            proxy_read_timeout 86400;
        }
    }
}